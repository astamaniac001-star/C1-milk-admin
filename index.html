<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1e40af" />
    <meta
      name="description"
      content="Milk Delivery Admin — door-step milk delivery management"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="MilkAdmin" />

    <title>Milk Admin V17</title>

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="stylesheet" href="/app.css" />

    <style>
      .login-card {
        background: #fff;
        border-radius: 16px;
        padding: 32px 24px;
        width: 100%;
        max-width: 340px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      }
      .login-logo {
        font-size: 40px;
        margin-bottom: 8px;
      }
      .login-title {
        font-size: 20px;
        font-weight: 700;
        color: #1e40af;
        margin: 0 0 4px;
      }
      .login-sub {
        font-size: 13px;
        color: #6b7280;
        margin: 0 0 24px;
      }

      .pin-dots {
        display: flex;
        justify-content: center;
        gap: 14px;
        margin-bottom: 24px;
      }
      .pin-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 2px solid #d1d5db;
        background: #fff;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .pin-dot.filled {
        background: #1e40af;
        border-color: #1e40af;
      }

      .pin-keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .pin-key {
        padding: 14px 0;
        font-size: 20px;
        font-weight: 600;
        color: #111;
        background: #f3f4f6;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.1s;
        -webkit-tap-highlight-color: transparent;
      }
      .pin-key:active {
        background: #dbeafe;
      }
      .pin-key.wide {
        grid-column: span 2;
        font-size: 14px;
        color: #6b7280;
      }
      .pin-key.back {
        color: #ef4444;
      }

      #login-error {
        margin-top: 16px;
        font-size: 13px;
        color: #991b1b;
        background: #fee2e2;
        border-radius: 8px;
        padding: 8px 12px;
        display: none;
      }
      #login-error.visible {
        display: block;
      }

      #login-loading {
        margin-top: 16px;
        font-size: 13px;
        color: #6b7280;
        display: none;
      }
      #login-loading.visible {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid #d1d5db;
        border-top-color: #1e40af;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Global toast (used by app.js before React mounts) ─────────────── */
      #global-toast {
        position: fixed;
        bottom: 72px;
        left: 50%;
        transform: translateX(-50%);
        background: #1e40af;
        color: #fff;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 13px;
        z-index: 99999;
        display: none;
        max-width: 320px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- React will mount here and handle all UI, including the Login screen -->
    <div id="app-root"></div>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
